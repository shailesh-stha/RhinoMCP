name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore router
        run: dotnet restore router/Router.csproj

      - name: Restore plugin
        run: dotnet restore rhino/RhMcp.csproj

      - name: Build router
        run: dotnet build router/Router.csproj --configuration ${{ matrix.configuration }} --no-restore

      - name: Build plugin (bundles router into yak output)
        run: dotnet build rhino/RhMcp.csproj --configuration ${{ matrix.configuration }} --no-restore

      - name: Test router
        run: dotnet test tests/router/Router.Tests.csproj --configuration ${{ matrix.configuration }} --verbosity normal
